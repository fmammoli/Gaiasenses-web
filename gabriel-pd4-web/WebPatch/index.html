<!doctype html>
<html lang="en">
  <head>
    <title>Pd4Web - BLE Motion Control</title>
    <meta charset="UTF-8" />
    <!-- pd4web.threads.js can help if you can't active Cross-Origin Resource Sharing (CORS) from server side -->
    <script src="./pd4web.threads.js"></script>
    <script src="./pd4web.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      .ble-control-panel {
        position: absolute;
        top: 10px;
        right: 10px;
        background: white;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        z-index: 100;
        min-width: 300px;
      }
      .ble-status {
        margin: 10px 0;
        padding: 10px;
        border-radius: 4px;
        font-size: 14px;
      }
      .ble-status.connected {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .ble-status.disconnected {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .ble-data {
        margin-top: 15px;
        padding: 10px;
        background-color: #f0f0f0;
        border-radius: 4px;
        font-size: 13px;
        font-family: monospace;
      }
      .ble-data-row {
        margin: 5px 0;
      }
      .ble-button {
        padding: 8px 16px;
        margin: 5px 5px 5px 0;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
      }
      .ble-button-connect {
        background-color: #007bff;
        color: white;
      }
      .ble-button-connect:hover {
        background-color: #0056b3;
      }
      .ble-button-disconnect {
        background-color: #dc3545;
        color: white;
      }
      .ble-button-disconnect:hover {
        background-color: #c82333;
      }
      .ble-error {
        color: #dc3545;
        font-size: 12px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <!-- All the styles are in the pd4web.style.css file loaded by pd4web.js -->
    <span class="pd4web-sound-switch" id="Pd4WebAudioSwitch"></span>

    <!-- BLE Control Panel -->
    <div class="ble-control-panel">
      <h3>Bluetooth Motion Control</h3>
      <div id="ble-status" class="ble-status disconnected">
        Status: <span id="ble-status-text">Disconnected</span>
      </div>
      <div>
        <button id="ble-connect-btn" class="ble-button ble-button-connect">
          Connect BLE Device
        </button>
        <button
          id="ble-disconnect-btn"
          class="ble-button ble-button-disconnect"
          style="display: none"
        >
          Disconnect
        </button>
      </div>
      <div id="ble-data" class="ble-data" style="display: none">
        <div class="ble-data-row">
          <strong>Connected Device:</strong> <span id="device-name">-</span>
        </div>
        <div class="ble-data-row">
          <strong>Latitude:</strong> <span id="coord-latitude">0.0</span>°
        </div>
        <div class="ble-data-row">
          <strong>Longitude:</strong> <span id="coord-longitude">0.0</span>°
        </div>
        <hr style="margin: 8px 0; border: none; border-top: 1px solid #ccc" />
        <div class="ble-data-row">
          <strong>Roll:</strong> <span id="motion-roll">0.0</span>°
        </div>
        <div class="ble-data-row">
          <strong>Pitch:</strong> <span id="motion-pitch">0.0</span>°
        </div>
        <div class="ble-data-row">
          <strong>Yaw:</strong> <span id="motion-yaw">0.0</span>°
        </div>
      </div>
      <div id="ble-error" class="ble-error"></div>
    </div>

    <div id="Pd4WebPatchDiv" class="Pd4WebPatchDiv">
      <svg id="Pd4WebCanvas"></svg>
    </div>

    <script>
      // BLE Configuration
      const BLE_CONFIG = {
        deviceName: "Bolota Senses",
        service: "19b10000-e8f2-537e-4f6c-d104768a1214",
        sensorCharacteristic: "19b10001-e8f2-537e-4f6c-d104768a1214",
        co2Characteristic: "19b10003-e8f2-537e-4f6c-d104768a1214",
      };

      // BLE State
      const bleState = {
        device: null,
        server: null,
        characteristic: null,
        isConnected: false,
        sensorData: {
          roll: 0,
          pitch: 0,
          yaw: 0,
        },
      };

      // Pd4Web
      var Pd4Web = null;

      // Initialize Pd4Web
      Pd4WebModule().then((Pd4WebModulePromise) => {
        Pd4Web = new Pd4WebModulePromise.Pd4Web();
      });

      // UI Elements
      const connectBtn = document.getElementById("ble-connect-btn");
      const disconnectBtn = document.getElementById("ble-disconnect-btn");
      const statusDiv = document.getElementById("ble-status");
      const statusText = document.getElementById("ble-status-text");
      const dataDiv = document.getElementById("ble-data");
      const deviceNameElem = document.getElementById("device-name");
      const latitudeElem = document.getElementById("coord-latitude");
      const longitudeElem = document.getElementById("coord-longitude");
      const rollElem = document.getElementById("motion-roll");
      const pitchElem = document.getElementById("motion-pitch");
      const yawElem = document.getElementById("motion-yaw");
      const errorElem = document.getElementById("ble-error");

      // Convert Euler angles to geographic coordinates using full 3D orientation.
      // Latitude and longitude are derived from a rotated reference vector,
      // so latitude is a composite of roll, pitch, and yaw.
      function anglesToCoordinates(roll, pitch, yaw) {
        const degToRad = Math.PI / 180;
        const r = roll * degToRad;
        const p = pitch * degToRad;
        const y = yaw * degToRad;

        // ZYX intrinsic rotation (yaw, pitch, roll) matrix components.
        const cy = Math.cos(y);
        const sy = Math.sin(y);
        const cp = Math.cos(p);
        const sp = Math.sin(p);
        const cr = Math.cos(r);
        const sr = Math.sin(r);

        // Rotate reference vector v0 = [1, 0, 0].
        const vx = cy * cp;
        const vy = sy * cp;
        const vz = -sp;

        // Apply roll influence by rotating around local X after yaw/pitch.
        // This keeps latitude responsive to full orientation in practice.
        const vzComposite = vz * cr + vy * sr;
        const vyComposite = vy * cr - vz * sr;

        const longitude = Math.atan2(vyComposite, vx) * (180 / Math.PI);
        const latitude =
          Math.atan2(
            vzComposite,
            Math.sqrt(vx * vx + vyComposite * vyComposite),
          ) *
          (180 / Math.PI);

        // Normalize/clamp to valid geographic ranges.
        return {
          latitude: Math.max(-90, Math.min(90, latitude)),
          longitude: ((longitude + 540) % 360) - 180,
        };
      }

      // Handle sensor data from BLE
      function handleSensorData(data) {
        if (data.euler) {
          bleState.sensorData.roll = data.euler.roll || 0;
          bleState.sensorData.pitch = data.euler.pitch || 0;
          bleState.sensorData.yaw = data.euler.yaw || 0;

          // Convert angles to coordinates
          const coords = anglesToCoordinates(
            bleState.sensorData.roll,
            bleState.sensorData.pitch,
            bleState.sensorData.yaw,
          );

          // Update UI
          latitudeElem.textContent = coords.latitude.toFixed(2);
          longitudeElem.textContent = coords.longitude.toFixed(2);
          rollElem.textContent = bleState.sensorData.roll.toFixed(2);
          pitchElem.textContent = bleState.sensorData.pitch.toFixed(2);
          yawElem.textContent = bleState.sensorData.yaw.toFixed(2);

          // Send to Pd4Web if available
          if (Pd4Web) {
            Pd4Web.sendFloat("x1", coords.longitude);
            Pd4Web.sendFloat("y1", coords.latitude);
            // Pd4Web.sendFloat("latitude", coords.latitude);
            // Pd4Web.sendFloat("longitude", coords.longitude);
          }

          console.log(
            `Motion: roll=${bleState.sensorData.roll}, pitch=${bleState.sensorData.pitch}, yaw=${bleState.sensorData.yaw} | Coords: lat=${coords.latitude.toFixed(2)}, lon=${coords.longitude.toFixed(2)}`,
          );
        }
      }

      // Handle characteristic value changes
      function handleCharacteristicValueChanged(event) {
        const characteristic = event.target;
        const value = characteristic.value;
        if (value) {
          try {
            const decoder = new TextDecoder("utf-8");
            const decodedData = decoder.decode(value);
            const parsedData = JSON.parse(decodedData);
            handleSensorData(parsedData);
          } catch (err) {
            console.error("Error parsing sensor data:", err);
          }
        }
      }

      // Update UI status
      function updateStatus(connected, message) {
        bleState.isConnected = connected;
        statusDiv.className = `ble-status ${connected ? "connected" : "disconnected"}`;
        statusText.textContent = message;
        connectBtn.style.display = connected ? "none" : "inline-block";
        disconnectBtn.style.display = connected ? "inline-block" : "none";
        dataDiv.style.display = connected ? "block" : "none";
      }

      // Show error message
      function showError(message) {
        errorElem.textContent = message;
        setTimeout(() => {
          errorElem.textContent = "";
        }, 5000);
      }

      // Connect to BLE device
      async function connectBLE() {
        try {
          errorElem.textContent = "";
          updateStatus(false, "Searching for device...");

          const device = await navigator.bluetooth.requestDevice({
            filters: [
              {
                services: [BLE_CONFIG.service],
              },
            ],
          });

          device.addEventListener("gattserverdisconnected", () => {
            updateStatus(false, "Device disconnected");
          });

          if (!device.gatt) {
            throw new Error("GATT server not found");
          }

          updateStatus(false, "Connecting...");
          const server = await device.gatt.connect();

          // Get the service
          const service = await server.getPrimaryService(BLE_CONFIG.service);

          // Get the sensor characteristic
          const characteristic = await service.getCharacteristic(
            BLE_CONFIG.sensorCharacteristic,
          );

          // Start notifications
          if (characteristic.properties.notify) {
            await characteristic.startNotifications();
            characteristic.addEventListener(
              "characteristicvaluechanged",
              handleCharacteristicValueChanged,
            );

            bleState.device = device;
            bleState.server = server;
            bleState.characteristic = characteristic;

            deviceNameElem.textContent = device.name || "Unknown Device";
            updateStatus(true, "Connected");

            console.log("Successfully connected to BLE device");
          } else {
            throw new Error("Characteristic does not support notifications");
          }
        } catch (err) {
          console.error("Bluetooth Error:", err);
          const errorMsg =
            err instanceof Error ? err.message : "Failed to connect to device";
          showError(errorMsg);
          updateStatus(false, "Connection failed");
        }
      }

      // Disconnect from BLE device
      function disconnectBLE() {
        try {
          if (
            bleState.characteristic &&
            bleState.characteristic.properties.notify
          ) {
            bleState.characteristic.stopNotifications();
            bleState.characteristic.removeEventListener(
              "characteristicvaluechanged",
              handleCharacteristicValueChanged,
            );
          }

          if (bleState.device && bleState.device.gatt?.connected) {
            bleState.device.gatt.disconnect();
          }

          bleState.device = null;
          bleState.server = null;
          bleState.characteristic = null;

          updateStatus(false, "Disconnected");
          console.log("Disconnected from BLE device");
        } catch (err) {
          console.error("Disconnect Error:", err);
          showError("Error during disconnect");
        }
      }

      // Event listeners
      connectBtn.addEventListener("click", connectBLE);
      disconnectBtn.addEventListener("click", disconnectBLE);

      // Initialize Pd4Web audio on sound switch click
      document.getElementById("Pd4WebAudioSwitch").addEventListener(
        "click",
        async () => {
          if (Pd4Web) {
            Pd4Web.init();
            console.log("Pd4Web initialized");
          }
        },
        { once: true },
      );
    </script>
  </body>
</html>
